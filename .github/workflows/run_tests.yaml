name: Run Opensearch Pipeline

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]


jobs:
  Wait-for-images:
    runs-on: ubuntu-latest
    outputs:
      skip_tests: ${{ steps.check.outputs.skip_tests }}
    steps:
      - name: Check if dev_build.yml was triggered for this commit
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHA="${{ github.event.pull_request.head.sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          RUNS=$(gh run list --workflow dev_build.yml --repo ${{ github.repository }} --commit $SHA)
          SKIP_TESTS="false"
          if [ -z "$RUNS" ]; then
            SKIP_TESTS="true"
          fi
          echo SKIP_TESTS: $SKIP_TESTS
          echo "skip_tests=$SKIP_TESTS" >> $GITHUB_OUTPUT
      - name: Wait for dev_build.yml to complete
        if: steps.check.outputs.skip_tests == 'false'
        uses: netcracker/qubership-workflow-hub/actions/wait-for-workflow@cabbb90e9471163cfac84bd50ff0296b2803b44c  # v2.3.0
        id: wait
        with:
          workflow: dev_build.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          poll-interval: 20

  Opensearch-Pipeline:
    needs: Wait-for-images
    uses: Netcracker/qubership-test-pipelines/.github/workflows/opensearch.yaml@1f271170b900faa82f2585e6da24a72253e59b14 #v1.10.0
    with:
      service_branch: '${{ github.head_ref || github.ref_name }}'
      pipeline_branch: '1f271170b900faa82f2585e6da24a72253e59b14' #this value must match the value after '@' in 'uses'
      runner_type: 'ubuntu-latest'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
