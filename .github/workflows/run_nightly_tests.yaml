name: Run Nightly Opensearch Pipeline

permissions:
  contents: read

on:
#  schedule:
#    - cron: '0 1 * * *'
  push

jobs:
  Nightly-Opensearch-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/opensearch.yaml@fix/disable_atp #v1.10.0
    with:
      service_branch: '${{ github.head_ref || github.ref_name }}'
      pipeline_branch: 'fix/disable_atp' #this value must match the value after '@' in 'uses'
      runner_type: 'ubuntu-latest'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}

