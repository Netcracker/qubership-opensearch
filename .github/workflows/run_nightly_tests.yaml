name: Run Nightly Opensearch Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: '0 3 * * *'

jobs:
  Nightly-Opensearch-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/opensearch.yaml@1f271170b900faa82f2585e6da24a72253e59b14 #v1.10.0
    with:
      service_branch: '${{ github.head_ref || github.ref_name }}'
      pipeline_branch: '1f271170b900faa82f2585e6da24a72253e59b14' #this value must match the value after '@' in 'uses'
      runner_type: 'ubuntu-latest'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}

