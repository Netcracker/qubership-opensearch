{
    schedule: "0 0 * * *"
    schedule: ${?BACKUP_SCHEDULE}

    eviction: "0/1d,7d/delete"
    eviction: ${?EVICTION_POLICY}

    granular_eviction: "7d/delete"
    granular_eviction: ${?GRANULAR_EVICTION_POLICY}

    enable_full_restore: true

    storage: /backup-storage

    instances_key: "-d"
    map_key: "-m"

    command: "python3 /opt/elasticsearch-curator/backup.py {{.data_folder}} {{.dbs}}"

    restore_command: "python3 /opt/elasticsearch-curator/restore.py {{.data_folder}} {{.skip_users_recovery}} {{.dbs}} {{.dbmap}} {{.clean}}"

    evict_command: "python3 /opt/elasticsearch-curator/evict.py {{.data_folder}}"

    list_instances_in_vault_command: "python3 /opt/elasticsearch-curator/list_instances_in_vault.py {{.data_folder}}"

    must_have_env_vars: []

    custom_vars = [skip_users_recovery, clean]

    log {
        level: INFO
        level: ${?LOG_LEVEL}

        format: "{{.asctime}} [{{.levelname}}-5s] [{{.name}}] [{{.thread}}] - {{.message}}"
    }
}
