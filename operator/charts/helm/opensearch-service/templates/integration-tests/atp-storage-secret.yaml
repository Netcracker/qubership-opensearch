{{- if and .Values.integrationTests.enabled .Values.integrationTests.atpReport.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "opensearch.fullname" . }}-integration-tests-atp-storage-secret
  labels:
    {{- include "opensearch-service.defaultLabels" . | nindent 4 }}
type: Opaque
stringData:
  atp-storage-username: {{ .Values.integrationTests.atpReport.atpStorage.username }}
  atp-storage-password: {{ .Values.integrationTests.atpReport.atpStorage.password }}
{{- end }}
