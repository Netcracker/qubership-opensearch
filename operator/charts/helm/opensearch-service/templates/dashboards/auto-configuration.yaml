{{- if not .Values.global.externalOpensearch.enabled }}
{{- if and .Values.dashboards.enabled (not .Values.dashboards.config) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "opensearch.fullname" . }}-dashboards-config
  labels:
{{ include "opensearch.labels.standard" . | indent 4 }}
{{ include "opensearch-service.defaultLabels" . | indent 4 }}
data:
  opensearch_dashboards.yml: |
    server:
      name: dashboards
      host: 0.0.0.0
      {{- if .Values.dashboards.opensearchAccount.keyPassphrase.enabled }}
      ssl:
        keyPassphrase: __KEY_PASSPHRASE__
      {{- end }}
    opensearch:
      username: __OPENSEARCH_USERNAME__
      password: __OPENSEARCH_PASSWORD__
      {{- if eq (include "opensearch.tlsEnabled" .) "true" }}
      ssl:
        verificationMode: full
        certificateAuthorities: /usr/share/opensearch-dashboards/certs/opensearch-root-ca.pem
      {{- end }}
    {{- if .Values.dashboards.opensearchAccount.secret }}
    opensearch_security:
      cookie:
        password: __COOKIE_PASS__
    {{- end }}
{{- end -}}
{{- end }}
