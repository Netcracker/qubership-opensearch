{{- if and .Values.dashboards.enabled (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") (eq .Values.PAAS_PLATFORM "KUBERNETES") -}}
{{- $serviceName := printf "%s-%s" (include "opensearch.fullname" .) "dashboards" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}-httproute
  labels:
    {{- include "opensearch.labels.standard" . | nindent 4 }}
    {{- include "opensearch-service.defaultLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.dashboards.ingress.gatewayName | default "default-external-gateway" }}
      namespace: {{ .Values.dashboards.ingress.envoyNamespace | default "envoy-gateway" }}
      port: 443
  hostnames:
    {{- range .Values.dashboards.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
  rules:
    - matches:
        {{- range .Values.dashboards.ingress.hosts }}
        {{- range .paths }}
        - path:
            type: PathPrefix
            value: {{ .path | quote }}
        {{- end }}
        {{- end }}
      backendRefs:
        - name: {{ $serviceName }}
          port: {{ .Values.dashboards.service.port }}

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}-redirect
  labels:
    {{- include "opensearch.labels.standard" . | nindent 4 }}
    {{- include "opensearch-service.defaultLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.dashboards.ingress.gatewayName | default "default-external-gateway" }}
      namespace: {{ .Values.dashboards.ingress.envoyNamespace | default "envoy-gateway" }}
      port: 80
  hostnames:
    {{- range .Values.dashboards.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}