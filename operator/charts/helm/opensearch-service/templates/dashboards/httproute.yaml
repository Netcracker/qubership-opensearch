{{- if and .Values.dashboards.envoyGateway.enabled (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") (eq .Values.PAAS_PLATFORM "KUBERNETES") -}}
{{- if .Values.dashboards.enabled -}}
{{- $serviceName := printf "%s-%s" (include "opensearch.fullname" .) "dashboards" }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}-httproute
  labels:
    {{- include "opensearch.labels.standard" . | nindent 4 }}
    {{- include "opensearch-service.defaultLabels" . | nindent 4 }}
spec:
  parentRefs:
  {{- include "gateway.parentRefs" (list . .Values.dashboards.envoyGateway.parentRefs 443) | nindent 2 }}
  
  hostnames:
  {{- if .Values.dashboards.envoyGateway.host }}
    - {{ .Values.dashboards.envoyGateway.host | quote }}
  {{- else }}
  {{- range .Values.dashboards.ingress.hosts }}
    - {{ .host | quote }}
  {{- end }}
  {{- end }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $serviceName }}
          port: {{ .Values.dashboards.service.port }}

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}-redirect
  labels:
    {{- include "opensearch.labels.standard" . | nindent 4 }}
    {{- include "opensearch-service.defaultLabels" . | nindent 4 }}
spec:
  parentRefs:
  {{- include "gateway.parentRefs" (list . .Values.opensearch.client.envoyGateway.parentRefs 80) | nindent 2 }}

  hostnames:
  {{- if .Values.dashboards.envoyGateway.host }}
    - {{ .Values.dashboards.envoyGateway.host | quote }}
  {{- else }}
  {{- range .Values.dashboards.ingress.hosts }}
    - {{ .host | quote }}
  {{- end }}
  {{- end }}

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

{{- end }}
{{- end }}