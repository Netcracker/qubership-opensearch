stringData:
  config.yml: |-
    _meta:
      type: "config"
      config_version: 2

    config:
      dynamic:
        http:
          anonymous_auth_enabled: false
          xff:
            enabled: false
            internalProxies: '192\.168\.0\.10|192\.168\.0\.11' # regex pattern
        authc:
          basic_internal_auth_domain:
            description: "Authenticate via HTTP Basic against internal users database"
            http_enabled: true
            transport_enabled: true
            order: 4
            http_authenticator:
              type: basic
              challenge: true
            authentication_backend:
              type: intern
  roles.yml: |-
    _meta:
      type: "roles"
      config_version: 2
    anomaly_full_access:
      reserved: true
      cluster_permissions:
        - 'cluster_monitor'
        - 'cluster:admin/opensearch/ad/*'
      index_permissions:
        - index_patterns:
            - '*'
          allowed_actions:
            - 'indices_monitor'
            - 'indices:admin/aliases/get'
            - 'indices:admin/mappings/get'
  roles_mapping.yml: |-
    _meta:
      type: "rolesmapping"
      config_version: 2
    opensearch_security_anonymous:
      backend_roles:
        - opensearch_security_anonymous_backendrole
    all_access:
      backend_roles:
        - admin
      reserved: false
      description: "Maps admin to all_access"
  tenants.yml: |-
    _meta:
      type: "tenants"
      config_version: 2
  action_groups.yml: |-
    _meta:
      type: "actiongroups"
      config_version: 2
  nodes_dn.yml: |-
    _meta:
      type: "nodesdn"
      config_version: 2
  whitelist.yml: |-
    _meta:
      type: "whitelist"
      config_version: 2
