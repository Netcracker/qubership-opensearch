apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app.kubernetes.io/version: ''
    app.kubernetes.io/part-of: 'opensearch-service'
    app.kubernetes.io/component: monitoring
    prometheus: OpenSearch-rules
    role: alert-rules
  name: prometheus-opensearch-service-rules
spec:
  groups:
    - name: platcert01-opensearch-service
      rules:
        - alert: OpenSearchCPULoadAlert
          annotations:
            description: 'OpenSearch CPU usage is above 95%.'
            summary: OpenSearch's CPU usage is above 95%
          expr: max(opensearch_process_cpu_percent{namespace="platcert01"}) > 95
          for: 3m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchDiskUsageAbove75%Alert
          annotations:
            description: 'OpenSearch disk usage is above 75%'
            summary: OpenSearch's disk usage is above 75%
          expr: 1 - sum(opensearch_fs_total_free_in_bytes{namespace="platcert01"}) / sum(opensearch_fs_total_total_in_bytes{namespace="platcert01"}) > 0.75 <= 0.85
          for: 3m
          labels:
            severity: warning
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchDiskUsageAbove85%Alert
          annotations:
            description: 'OpenSearch disk usage is above 85%'
            summary: OpenSearch's disk usage is above 85%
          expr: 1 - sum(opensearch_fs_total_free_in_bytes{namespace="platcert01"}) / sum(opensearch_fs_total_total_in_bytes{namespace="platcert01"}) > 0.85 <= 0.95
          for: 3m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchDiskUsageAbove95%Alert
          annotations:
            description: 'OpenSearch disk usage is above 95%'
            summary: OpenSearch's disk usage is above 95%
          expr: 1 - sum(opensearch_fs_total_free_in_bytes{namespace="platcert01"}) / sum(opensearch_fs_total_total_in_bytes{namespace="platcert01"}) > 0.95
          for: 3m
          labels:
            severity: critical
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchHeapMemoryUsageAlert
          annotations:
            description: 'OpenSearch heap memory usage is above 95%.'
            summary: OpenSearch's heap memory usage is above 95%
          expr: max(opensearch_jvm_mem_heap_used_percent{namespace="platcert01"}) > 95
          for: 3m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchIsDegradedAlert
          annotations:
            description: 'OpenSearch is Degraded.'
            summary: Some of OpenSearch Service pods are down
          expr: opensearch_cluster_health_status_code{namespace="platcert01"} == 6
          for: 3m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchIsDownAlert
          annotations:
            description: 'OpenSearch is Down.'
            summary: All of OpenSearch Service pods are down
          expr: opensearch_cluster_health_status_code{namespace="platcert01"} == 10
          for: 3m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchDBaaSIsDownAlert
          annotations:
            description: 'OpenSearch DBaaS agent is Down.'
            summary: OpenSearch DBaaS agent is Down
          expr: opensearch_dbaas_health_status{namespace="platcert01"} == 1
          for: 3m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchLegacyIndicesDetectedAlert
          annotations:
            description: 'OpenSearch cluster contains indices created in version 1.x that should be migrated.'
            summary: Legacy OpenSearch 1.x indices detected
          expr: sum(opensearch_indices_version_created_count{namespace="platcert01",version_num=~"1[0-9]*"}) > 0
          for: 10m
          labels:
            severity: warning
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchLastBackupHasFailedAlert
          annotations:
            description: 'OpenSearch Last Backup Has Failed.'
            summary: OpenSearch Last Backup Has Failed
          expr: opensearch_backups_metric_last_backup_status{namespace="platcert01"} != 1
          for: 3m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
        - alert: OpenSearchQueryIsTooSlowAlert
          annotations:
            description: 'OpenSearch Query Is Too Slow.'
            summary: OpenSearch Query Is Too Slow
          expr: opensearch_slow_query_took_millis{namespace="platcert01"} > 10 * 1000
          for: 1m
          labels:
            severity: high
            namespace: platcert01
            service: opensearch-service
